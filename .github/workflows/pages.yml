name: Deploy Logbook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install mobile browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run release, unit, mobile and accessibility checks
        run: npm run check

      - name: Prepare production files
        run: |
          mkdir _site
          cp index.html manifest.webmanifest favicon.svg fonts.css styles.css _site/
          cp quotes.js i18n.js supabase-config.js supabase-client.js error-tracking.js auth.js cloud-sync.js app.js pwa.js service-worker.js _site/
          cp -R modules _site/modules
          cp -R assets _site/assets
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
