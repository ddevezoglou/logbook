<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Seed δεδομένων — Logbook</title>
</head>
<body>
  <p>Φόρτωση δοκιμαστικών δεδομένων (54 καταγραφές + προγράμματα 7/8/9/10 ημερών)…</p>
  <script>
    // Τρέχει το seed-week.js αλλά αντί για reload πάει στο index.html,
    // αλλιώς η σελίδα seed θα ξαναφόρτωνε τον εαυτό της σε βρόχο.
    fetch('seed-week.js?v=' + Date.now(), { cache: 'no-store' })
      .then(r => r.text())
      .then(code => {
        new Function(code.replace("location.reload()", "location.href = 'index.html'"))();
      })
      .catch(err => {
        document.body.textContent = 'Σφάλμα seed: ' + err;
      });
  </script>
</body>
</html>
